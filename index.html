<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/style.css">
  
  <title>Frontend Mentor | Todo app</title>
</head>
<body>
  
  <header class="header">
    <div class="header__background">
      <div class="header__text container">
          <h1 class="header__title">Todo</h1>
          <div class="header__icon"></div>
      </div>
    </div>
  </header>




 <main>
    <div class="container">
      <form class="form">
        <div class="form__group">
         <label for="checkbox">
            <input type="checkbox" class="form__checkbox" id = "checkbox">

            <span class="form__checkbox--span"></span>


            <input type="text" name="task" class="form__input"placeholder="Create a new todo...">
         </label>

        </div>
      </form>


      <ul class="tasks">
        <span class="line">
        <li class="task">
          

         
          <div>
            <label class="task__label" for="task__checkbox--1" id="checkbox">

              <input type="checkbox" class="task__checkbox" id="task__checkbox--1">
              <span class="task__checkbox--span"></span>
              <span class="task__text">Complete Online JavaScript Course</span>
            </label>
          </div>

          <div class="task__icons">
            <button class="task__edit" type="button">  
    
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="28"
              height="28"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#393a4c"
              stroke-width="1"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M4 20h4l10.5 -10.5a2.828 2.828 0 1 0 -4 -4l-10.5 10.5v4" />
              <path d="M13.5 6.5l4 4" />
            </svg>

            </button>

            <button class="task__x" type="button"><img src="images/icon-cross.svg" alt="Icon Delete"></button>
          </div>
        </li>
        </span>
      </ul>
      

    </div>
  </main> 


<!-- 
  All
  Active 
  Completed

  Clear Completed

  Drag and drop to reorder list -->


  <script src="js/funciones.js"></script>
</body>
</html>
